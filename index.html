<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Финни</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f4f4f9; }
        #chat { height: 300px; border: 1px solid #ccc; background: white; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .user { color: blue; margin-bottom: 5px; }
        .bot { color: green; margin-bottom: 10px; font-weight: bold; }
        input { width: 75%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { width: 20%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Чат с Финни (Beta)</h2>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Спроси что-нибудь...">
    <button onclick="sendMessage()">Отправить</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const message = input.value;
            if (!message) return;

            // Показываем сообщение пользователя
            chat.innerHTML += `<div class="user">Вы: ${message}</div>`;
            input.value = '';

            try {
                // ОТПРАВЛЯЕМ ЗАПРОС НА ТВОЙ СЕРВЕР
                const response = await fetch('https://finny-backend.vercel.app/api/server', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.text();
                
                // Показываем ответ бота
                chat.innerHTML += `<div class="bot">Финни: ${data}</div>`;
                chat.scrollTop = chat.scrollHeight; // Прокрутка вниз
            } catch (error) {
                chat.innerHTML += `<div style="color:red">Ошибка: Не удалось связаться с сервером</div>`;
            }
        }
    </script>
</body>
</html>
