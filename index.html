<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finny AI Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #eceff1; }
        #chat { height: 350px; border: 1px solid #cfd8dc; background: white; overflow-y: auto; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { color: #1565c0; margin-bottom: 8px; font-weight: 500; }
        .bot { color: #2e7d32; margin-bottom: 15px; font-weight: bold; }
        .input-group { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid #b0bec5; outline: none; }
        button { padding: 12px 20px; cursor: pointer; background: #263238; color: white; border: none; border-radius: 6px; transition: 0.3s; }
        button:hover { background: #455a64; }
    </style>
</head>
<body>
    <h2>Chat with Finny (Beta)</h2>
    <div id="chat"></div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Type your financial question...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const message = input.value;
            if (!message) return;

            chat.innerHTML += `<div class="user">You: ${message}</div>`;
            input.value = '';

            try {
                const response = await fetch('/api/server', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.text();
                chat.innerHTML += `<div class="bot">Finny: ${data}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<div style="color:red">Error: Connection failed.</div>`;
            }
        }
    </script>
</body>
</html>
